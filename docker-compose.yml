services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: pastebin
      POSTGRES_PASSWORD: pastebin
      POSTGRES_DB: pastebin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pastebin"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    image: pastebin:latest
    command: ["uv", "run", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://pastebin:pastebin@db:5432/pastebin
    depends_on:
      db:
        condition: service_healthy

  app:
    image: pastebin:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pastebin:pastebin@db:5432/pastebin
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: pastebin:latest
    command: ["uv", "run", "python", "-m", "worker.cleanup"]
    environment:
      DATABASE_URL: postgresql+asyncpg://pastebin:pastebin@db:5432/pastebin
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata: