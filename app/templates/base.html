<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}pastebin{% endblock %}</title>
  <link rel="stylesheet" href="/static/highlight.css">
  <style>
    body { font-family: ui-monospace, monospace; margin: 0; background: #1e1e1e; color: #ddd; }
    header { padding: 1rem; border-bottom: 1px solid #333; display: flex; gap: 1rem; align-items: center; }
    a { color: #7cb; }
    main { padding: 1rem; }
    .highlight { overflow-x: auto; border-radius: 4px; }
    .highlight pre { margin: 0; padding: 0.5rem; }
    .meta { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>{% block header %}{% endblock %}</header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
